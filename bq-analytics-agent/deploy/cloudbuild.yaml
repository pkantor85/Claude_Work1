# ============================================================
# Cloud Build — Build and deploy to Cloud Run
# ============================================================
#
# Usage:
#   gcloud builds submit --config deploy/cloudbuild.yaml .
#
# Override the image tag (optional):
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions=_TAG=v1.2.3 .
#
# ============================================================

substitutions:
  _SERVICE_NAME: bq-analytics-agent
  _REGION: us-central1
  _TAG: latest

steps:
  # ── Step 1: Build Docker image ───────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_TAG}"
      - "-t"
      - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest"
      - "-f"
      - "deploy/Dockerfile"
      - "."

  # ── Step 2: Push image to Container Registry ────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_TAG}"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest"

  # ── Step 3: Deploy to Cloud Run ─────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_TAG}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "5"
      - "--concurrency"
      - "80"
      - "--timeout"
      - "600"
      - "--cpu-boost"
      - "--session-affinity"
      - "--execution-environment"
      - "gen2"
      - "--set-env-vars"
      - "PYTHONUNBUFFERED=1"

images:
  - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_TAG}"
  - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
