# ============================================================
# Cloud Run Service Definition
# ============================================================
# Apply with:
#   gcloud run services replace deploy/cloudrun_service.yaml \
#       --region=us-central1
# ============================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bq-analytics-agent
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "BigQuery Data Analytics Agent - Streamlit Chat UI"
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/sessionAffinity: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 600
      serviceAccountName: ""  # Set your service account
      containers:
        - image: gcr.io/PROJECT_ID/bq-analytics-agent:latest  # Replace PROJECT_ID
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            periodSeconds: 30
  traffic:
    - percent: 100
      latestRevision: true
